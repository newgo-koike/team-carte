<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>🔒 Team カルテ</title>
<style>
  body { margin:0; padding:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, #fff8ed 0%, #f4e4d6 100%);
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", -apple-system, sans-serif; }
  .login-card { background: #fff; padding: 40px 36px; border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,.08), 0 24px 48px rgba(46,42,38,.1);
    width: min(380px, 92vw); }
  .login-card h1 { font-size: 20px; margin: 0 0 6px; color: #2e2a26; font-weight: 600; }
  .login-card .sub { font-size: 12px; color: #6b635a; margin-bottom: 24px; }
  .login-card label { display: block; font-size: 12px; color: #6b635a; margin-bottom: 6px; }
  .login-card input { width: 100%; padding: 12px 14px; border: 1px solid #e8dfd2; border-radius: 8px;
    font-size: 14px; font-family: inherit; box-sizing: border-box; outline: none; transition: border-color .15s; }
  .login-card input:focus { border-color: #b87151; }
  .login-card button { width: 100%; margin-top: 14px; padding: 12px; border: 0; border-radius: 8px;
    background: #b87151; color: #fff; font-weight: 600; font-size: 14px; cursor: pointer;
    font-family: inherit; transition: background .15s; }
  .login-card button:hover { background: #a3623f; }
  .login-card .err { color: #c44; font-size: 12px; margin-top: 10px; min-height: 16px; }
  .check-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 12px; color: #6b635a; }
  .check-row input[type=checkbox] { width: auto; }
  .lock-icon { font-size: 28px; margin-bottom: 8px; }
  #app { display: none; }
  body.unlocked { display: block; align-items: initial; background: initial; }
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <div class="lock-icon">🔒</div>
    <h1>Team カルテ</h1>
    <div class="sub">パスワードを入力してください</div>
    <form id="login-form" autocomplete="off">
      <label for="pw">パスワード</label>
      <input id="pw" type="password" autofocus required autocomplete="current-password">
      <div class="check-row">
        <input id="remember" type="checkbox" checked>
        <label for="remember" style="margin: 0;">このブラウザに記憶する（次回から自動入力）</label>
      </div>
      <button type="submit">開く</button>
      <div class="err" id="err"></div>
    </form>
  </div>
</div>

<div id="app"></div>

const ITERATIONS = 200000;
const STORAGE_KEY = "team-carte-pw";

function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: ITERATIONS, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function tryDecrypt(password) {
  const blob = b64ToBytes(ENC_BLOB);
  const salt = blob.slice(0, 16);
  const iv = blob.slice(16, 28);
  const ct = blob.slice(28);
  const key = await deriveKey(password, salt);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(plain);
}

function unlock(html) {
  // 復号後の HTML を表示
  document.getElementById("login").style.display = "none";
  document.body.classList.add("unlocked");

  // <html>...</html> から <head> と <body> の中身を抜き出して埋め込む
  const headMatch = html.match(/<head[^>]*>([\s\S]*?)<\/head>/i);
  const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);

  if (headMatch) {
    // styleタグだけを取り込み（meta重複は避ける）
    const styles = headMatch[1].match(/<style[\s\S]*?<\/style>/gi);
    if (styles) styles.forEach(s => document.head.insertAdjacentHTML("beforeend", s));
  }

  const app = document.getElementById("app");
  if (bodyMatch) {
    app.innerHTML = bodyMatch[1];
    app.style.display = "block";
    // body内のscriptを再実行（innerHTMLでは実行されないので）
    app.querySelectorAll("script").forEach(old => {
      const s = document.createElement("script");
      [...old.attributes].forEach(a => s.setAttribute(a.name, a.value));
      s.textContent = old.textContent;
      old.parentNode.replaceChild(s, old);
    });
  } else {
    app.innerHTML = html;
    app.style.display = "block";
  }
}

async function attempt(password, save) {
  try {
    const html = await tryDecrypt(password);
    if (save) localStorage.setItem(STORAGE_KEY, password);
    unlock(html);
    return true;
  } catch (e) {
    return false;
  }
}

// 自動アンロック
(async () => {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    const ok = await attempt(stored, false);
    if (!ok) localStorage.removeItem(STORAGE_KEY);
  }
})();

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const pw = document.getElementById("pw").value;
  const remember = document.getElementById("remember").checked;
  const err = document.getElementById("err");
  err.textContent = "";
  const ok = await attempt(pw, remember);
  if (!ok) err.textContent = "パスワードが違います";
});
</script>
